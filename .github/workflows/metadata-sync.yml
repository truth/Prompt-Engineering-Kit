name: Metadata Sync Validation

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate-metadata-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate metadata sync
        run: python scripts/validate_metadata_sync.py
